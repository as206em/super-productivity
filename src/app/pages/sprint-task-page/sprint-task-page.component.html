<work-view
  [backlogTasks]="[]"
  [doneTasks]="doneTasks()"
  [isMainListSortingDisabled]="true"
  [isShowBacklog]="false"
  [isStandaloneTaskList]="true"
  [mainListModelId]="listModelId"
  [undoneTasks]="undoneTasks()"
>
  @if (capacityStats().progressPercentage !== undefined) {
    <div
      workViewHeaderAction
      class="capacity-indicator"
    >
      <mat-icon>speed</mat-icon>
      <span>{{ capacityEstimateLabel() }}</span>
      <span class="capacity-total">/ {{ capacityTotalLabel() }}</span>
      <progress-bar
        [progress]="capacityStats().progressPercentage || 0"
        [cssClass]="getCapacityProgressBarClass(capacityStats().progressPercentage)"
      ></progress-bar>
    </div>
  }

  @if (isCurrentSprint) {
    <button
      workViewHeaderAction
      mat-stroked-button
      color="primary"
      type="button"
      (click)="closeSprint()"
    >
      <mat-icon>done_all</mat-icon>
      {{ T.SPRINT.CLOSE | translate }}
    </button>
  }
</work-view>
